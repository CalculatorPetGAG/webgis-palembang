<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peta Palembang</title>
    <!-- CSS Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>
    <style>
        body { margin: 0; padding: 0; }
        #map { width: 100vw; height: 100vh; }
    </style>
</head>
<body>

<div id="map"></div>

<!-- JavaScript Leaflet -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
 integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
 crossorigin=""></script>

<script>
    // 1. Inisialisasi peta dengan titik tengah awal di Kota Palembang
    const map = L.map('map').setView([-2.9761, 104.7754], 12); 

    // 2. Tambahkan layer basemap menggunakan OpenStreetMap
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
    }).addTo(map);

    // 3. Mengambil (fetch) data GeoJSON
    // Disetting untuk membaca file bernama 'Palembang.geojson' yang sejajar dengan file index.html ini
    fetch('./Palembang.geojson')
        .then(response => {
            if (!response.ok) {
                throw new Error('Gagal memuat file Palembang.geojson');
            }
            return response.json();
        })
        .then(data => {
            // 4. Tambahkan layer GeoJSON ke dalam peta
            const geojsonLayer = L.geoJSON(data, {
                // Konfigurasi ini akan memunculkan popup berisi semua data atribut saat peta diklik
                onEachFeature: function (feature, layer) {
                    if (feature.properties) {
                        let popupContent = "<b>Detail Informasi:</b><br>";
                        for (let key in feature.properties) {
                            popupContent += `<b>${key}</b>: ${feature.properties[key]}<br>`;
                        }
                        layer.bindPopup(popupContent);
                    }
                }
            }).addTo(map);

            // 5. FitBounds agar layar otomatis menyesuaikan zoom ke keseluruhan wilayah yang ada di GeoJSON
            map.fitBounds(geojsonLayer.getBounds());
        })
        .catch(error => {
            console.error('Error:', error);
            // Alert ini akan muncul jika file Palembang.geojson tidak ditemukan
            alert('File Palembang.geojson belum ditemukan. Pastikan Anda sudah mengunggah file Palembang.geojson ke repository yang sama (sejajar) dengan file index.html ini.');
        });
</script>

</body>
</html>
